spring.application.name=patitas-unidas-api
server.port=8080

spring.config.import=optional:classpath:application-local.properties

# SQL Server SQLEXPRESS02 - base [Patitas Unidas] - puerto 1433
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=Patitas Unidas;encrypt=true;trustServerCertificate=true
spring.datasource.username=patitas_app
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

spring.sql.init.mode=never

app.cors.allowed-origins=http://localhost:4200
